---
- name: Ensure ~/bin exists
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/bin"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Deploy host scripts
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "/home/{{ ansible_user }}/bin/{{ item }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  loop: "{{ host_scripts }}"

# Ansible's cron module matches on `name:`, so renaming a job orphans the old
# entry. If a job is removed from inventory, drop it here by flipping to
# `state: absent` with the original name rather than deleting the line.
- name: Install cron jobs
  ansible.builtin.cron:
    name: "{{ item.name }}"
    user: "{{ ansible_user }}"
    minute: "{{ item.minute | default('*') }}"
    hour: "{{ item.hour | default('*') }}"
    day: "{{ item.day | default('*') }}"
    month: "{{ item.month | default('*') }}"
    weekday: "{{ item.weekday | default('*') }}"
    job: "{{ item.job }}"
    state: "{{ item.state | default('present') }}"
  loop: "{{ host_cron_jobs }}"
  loop_control:
    label: "{{ item.name }}"
