---
- name: Verify Master Key locally
  ansible.builtin.stat:
    path: "~/.cloudflared/cert.pem"
  delegate_to: localhost
  become: false
  register: cloudflared_local_cert

- name: Notify user to check browser for Cloudflare login
  ansible.builtin.pause:
    prompt: |
      --------------------------------------------------------------------------------
      MASTER KEY MISSING!
      A browser window will now open to authorize your Cloudflare account.
      Please log in and select your domain ({{ cloudflare.domain }}).

      Press [ENTER] to open the browser and start the login flow...
      --------------------------------------------------------------------------------
  delegate_to: localhost
  become: false
  when: not cloudflared_local_cert.stat.exists

- name: Start Cloudflare Login Flow
  ansible.builtin.command: "cloudflared tunnel login"
  delegate_to: localhost
  become: false
  async: 300
  poll: 0
  when: not cloudflared_local_cert.stat.exists

- name: Wait for Master Key to be authorized (Up to 5 minutes)
  ansible.builtin.wait_for:
    path: "{{ lookup('env', 'HOME') }}/.cloudflared/cert.pem"
    state: present
    timeout: 300
  delegate_to: localhost
  become: false
  when: not cloudflared_local_cert.stat.exists

- name: Check if tunnel already exists locally
  ansible.builtin.shell:
    cmd: "set -o pipefail && cloudflared tunnel list | grep -q {{ cloudflare.tunnel_name }}"
    executable: /bin/bash
  delegate_to: localhost
  become: false
  register: cloudflared_tunnel_exists
  # grep returns 1 when no match — that's the "tunnel missing" signal, not a
  # failure. Downstream tasks branch on cloudflared_tunnel_exists.rc.
  failed_when: false
  changed_when: false

- name: Create Tunnel locally
  ansible.builtin.command: "cloudflared tunnel create {{ cloudflare.tunnel_name }}"
  delegate_to: localhost
  become: false
  register: cloudflared_tunnel_create
  when: cloudflared_tunnel_exists.rc != 0
  changed_when: "'Created tunnel' in cloudflared_tunnel_create.stdout"

- name: Get Tunnel ID locally
  ansible.builtin.shell:
    cmd: "set -o pipefail && cloudflared tunnel list | grep {{ cloudflare.tunnel_name }} | awk '{print $1}'"
    executable: /bin/bash
  delegate_to: localhost
  become: false
  register: cloudflared_tunnel_id
  changed_when: false

- name: Route Wildcard DNS locally
  ansible.builtin.shell: "cloudflared tunnel route dns {{ cloudflare.tunnel_name }} \"*.{{ cloudflare.domain }}\""
  delegate_to: localhost
  become: false
  register: cloudflared_dns_route_wildcard
  # cloudflared exits non-zero when the route already exists; changed_when
  # captures the "actually did something" case.
  failed_when: false
  when: cloudflared_tunnel_exists.rc != 0
  changed_when: "'Successfully' in cloudflared_dns_route_wildcard.stdout"

- name: Route Root DNS locally
  ansible.builtin.command: "cloudflared tunnel route dns {{ cloudflare.tunnel_name }} \"{{ cloudflare.domain }}\""
  delegate_to: localhost
  become: false
  register: cloudflared_dns_route_root
  # Same behaviour as the wildcard route above: treat "already exists" as OK.
  failed_when: false
  when: cloudflared_tunnel_exists.rc != 0
  changed_when: "'Successfully' in cloudflared_dns_route_root.stdout"

- name: Read local credentials file
  ansible.builtin.command: "cat {{ lookup('env', 'HOME') }}/.cloudflared/{{ cloudflared_tunnel_id.stdout }}.json"
  delegate_to: localhost
  become: false
  register: cloudflared_tunnel_json
  changed_when: false

- name: Ensure /etc/cloudflared exists on server
  ansible.builtin.file:
    path: /etc/cloudflared
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy credentials to server
  ansible.builtin.copy:
    content: "{{ cloudflared_tunnel_json.stdout }}"
    dest: "/etc/cloudflared/credentials.json"
    owner: root
    group: root
    mode: "0600"

- name: Deploy cloudflared config
  ansible.builtin.template:
    src: cloudflared_config.yaml.j2
    dest: /etc/cloudflared/config.yml
    owner: root
    group: root
    mode: "0644"
  vars:
    tunnel_id: "{{ cloudflared_tunnel_id.stdout }}"

- name: Check if cloudflared is installed on server
  ansible.builtin.command: which cloudflared
  register: cloudflared_cf_installed
  # Probe for the binary — rc != 0 just means "not installed yet", handled
  # by the subsequent install tasks.
  failed_when: false
  changed_when: false

- name: Download cloudflared package on server
  ansible.builtin.get_url:
    url: https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
    dest: /tmp/cloudflared.deb
    mode: "0644"
  when: cloudflared_cf_installed.rc != 0

- name: Install cloudflared on server
  ansible.builtin.apt:
    deb: /tmp/cloudflared.deb
  when: cloudflared_cf_installed.rc != 0

- name: Install cloudflared service
  ansible.builtin.command: cloudflared service install
  args:
    creates: /etc/systemd/system/cloudflared.service

- name: Ensure cloudflared service is enabled and running
  ansible.builtin.systemd:
    name: cloudflared
    state: started
    enabled: true
    daemon_reload: true
