---
- name: Verify Master Key locally
  stat:
    path: "~/.cloudflared/cert.pem"
  delegate_to: localhost
  become: no
  register: _local_cert

- name: Notify user to check browser for Cloudflare login
  pause:
    prompt: |
      --------------------------------------------------------------------------------
      MASTER KEY MISSING!
      A browser window will now open to authorize your Cloudflare account.
      Please log in and select your domain ({{ cloudflare.domain }}).
      
      Press [ENTER] to open the browser and start the login flow...
      --------------------------------------------------------------------------------
  delegate_to: localhost
  become: no
  when: not _local_cert.stat.exists

- name: Start Cloudflare Login Flow
  command: "cloudflared tunnel login"
  delegate_to: localhost
  become: no
  async: 300
  poll: 0
  when: not _local_cert.stat.exists

- name: Wait for Master Key to be authorized (Up to 5 minutes)
  wait_for:
    path: "{{ lookup('env', 'HOME') }}/.cloudflared/cert.pem"
    state: present
    timeout: 300
  delegate_to: localhost
  become: no
  when: not _local_cert.stat.exists

- name: Check if tunnel already exists locally
  shell: "cloudflared tunnel list | grep -q {{ cloudflare.tunnel_name }}"
  delegate_to: localhost
  become: no
  register: _tunnel_exists
  # grep returns 1 when no match — that's the "tunnel missing" signal, not a
  # failure. Downstream tasks branch on _tunnel_exists.rc.
  failed_when: false
  changed_when: false

- name: Create Tunnel locally
  shell: "cloudflared tunnel create {{ cloudflare.tunnel_name }}"
  delegate_to: localhost
  become: no
  register: _tunnel_create
  when: _tunnel_exists.rc != 0
  changed_when: "'Created tunnel' in _tunnel_create.stdout"

- name: Get Tunnel ID locally
  shell: "cloudflared tunnel list | grep {{ cloudflare.tunnel_name }} | awk '{print $1}'"
  delegate_to: localhost
  become: no
  register: _tunnel_id
  changed_when: false

- name: Route Wildcard DNS locally
  shell: "cloudflared tunnel route dns {{ cloudflare.tunnel_name }} \"*.{{ cloudflare.domain }}\""
  delegate_to: localhost
  become: no
  register: _dns_route_wildcard
  # cloudflared exits non-zero when the route already exists; changed_when
  # captures the "actually did something" case.
  failed_when: false
  when: _tunnel_exists.rc != 0
  changed_when: "'Successfully' in _dns_route_wildcard.stdout"

- name: Route Root DNS locally
  shell: "cloudflared tunnel route dns {{ cloudflare.tunnel_name }} \"{{ cloudflare.domain }}\""
  delegate_to: localhost
  become: no
  register: _dns_route_root
  # Same behaviour as the wildcard route above: treat "already exists" as OK.
  failed_when: false
  when: _tunnel_exists.rc != 0
  changed_when: "'Successfully' in _dns_route_root.stdout"

- name: Route Public Services to Tunnel
  shell: "cloudflared tunnel route dns {{ cloudflare.tunnel_name }} \"{{ item.subdomain }}.{{ cloudflare.domain }}\""
  delegate_to: localhost
  become: no
  loop: "{{ services | selectattr('public', 'defined') | selectattr('public', 'equalto', true) | rejectattr('subdomain', 'equalto', '@') | list }}"
  register: _cf_route_res
  # Existing CNAMEs cause non-zero exit; changed_when flags genuine additions.
  failed_when: false
  changed_when: "'Added CNAME' in _cf_route_res.stdout"

- name: Read local credentials file
  shell: "cat {{ lookup('env', 'HOME') }}/.cloudflared/{{ _tunnel_id.stdout }}.json"
  delegate_to: localhost
  become: no
  register: _tunnel_json
  changed_when: false

- name: Ensure /etc/cloudflared exists on server
  file:
    path: /etc/cloudflared
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Deploy credentials to server
  copy:
    content: "{{ _tunnel_json.stdout }}"
    dest: "/etc/cloudflared/credentials.json"
    owner: root
    group: root
    mode: '0600'

- name: Deploy cloudflared config
  template:
    src: cloudflared_config.yaml.j2
    dest: /etc/cloudflared/config.yml
  vars:
    tunnel_id: "{{ _tunnel_id.stdout }}"

- name: Check if cloudflared is installed on server
  command: which cloudflared
  register: _cf_installed
  # Probe for the binary — rc != 0 just means "not installed yet", handled
  # by the subsequent install tasks.
  failed_when: false
  changed_when: false

- name: Download cloudflared package on server
  get_url:
    url: https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
    dest: /tmp/cloudflared.deb
  when: _cf_installed.rc != 0

- name: Install cloudflared on server
  apt:
    deb: /tmp/cloudflared.deb
  when: _cf_installed.rc != 0

- name: Install cloudflared service
  shell: cloudflared service install
  args:
    creates: /etc/systemd/system/cloudflared.service

- name: Ensure cloudflared service is enabled and running
  systemd:
    name: cloudflared
    state: started
    enabled: true
    daemon_reload: true
