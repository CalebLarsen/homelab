---
- name: Ensure Caddy configuration directory exists
  ansible.builtin.file:
    path: "{{ config_root }}/caddy"
    state: directory
    owner: "{{ puid }}"
    group: "{{ pgid }}"
    mode: "0755"

- name: Ensure static website directory exists
  ansible.builtin.file:
    path: "{{ storage.site_root }}"
    state: directory
    owner: "{{ puid }}"
    group: "{{ pgid }}"
    mode: "0755"

- name: Deploy Caddyfile from template
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ config_root }}/caddy/Caddyfile"
    owner: "{{ puid }}"
    group: "{{ pgid }}"
    mode: "0644"
  notify: Restart caddy
