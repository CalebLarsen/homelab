---
# cross-seed's config.js is templated post-deploy by api_wiring.yml — it needs
# Prowlarr's API up and configured to enumerate torznab URLs. Here we only
# create the directory cross-seed will hardlink matched files into.
- name: Ensure cross-seed link directory exists
  # Sibling of torrents/, not inside it — cross-seed v6 rejects nesting linkDirs
  # inside dataDirs. Same filesystem so hardlinks still work.
  ansible.builtin.file:
    path: "{{ data_root }}/cross-seed-links"
    state: directory
    owner: "{{ puid }}"
    group: "{{ pgid }}"
    mode: "0755"
