---
# Static site served by Caddy at note.caleb.trade. The vhost block lives in
# roles/service_manager/templates/Caddyfile.j2; this role just keeps the
# checkout in sync with notes_version.

- name: Ensure git is installed
  ansible.builtin.apt:
    name: git
    state: present

- name: Clone notes repo at pinned version
  ansible.builtin.git:
    repo: "{{ notes_repo }}"
    dest: "{{ notes_dest }}"
    version: "{{ notes_version }}"
    force: true
  become_user: "{{ ansible_user }}"
  become: true
