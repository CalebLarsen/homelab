---
# Static site served by Caddy at note.caleb.trade. The vhost block lives in
# roles/service-manager/templates/Caddyfile.j2; this role just keeps the
# checkout in sync with notes_version.

- name: Ensure git is installed
  apt:
    name: git
    state: present

- name: Clone notes repo at pinned version
  git:
    repo: "{{ notes_repo }}"
    dest: "{{ notes_dest }}"
    version: "{{ notes_version }}"
    force: yes
  become_user: "{{ ansible_user }}"
  become: yes

# The cloudflared role's per-service DNS loop only walks the services list, and
# the wildcard CNAME there only fires on initial tunnel creation. Register the
# subdomain explicitly so Cloudflare CNAMEs note.caleb.trade to the tunnel.
- name: Route note subdomain to Cloudflare tunnel
  shell: 'cloudflared tunnel route dns {{ cloudflare.tunnel_name }} "note.{{ cloudflare.domain }}"'
  delegate_to: localhost
  become: no
  register: _notes_dns_route
  failed_when: false
  changed_when: "'Added CNAME' in _notes_dns_route.stdout"
