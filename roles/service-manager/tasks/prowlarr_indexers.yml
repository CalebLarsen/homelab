---
- name: Fetch available indexer definitions from Prowlarr
  uri:
    url: "http://localhost:9696/api/v1/indexer/schema"
    method: GET
    headers: { X-Api-Key: "{{ prowlarr_api_key }}" }
    status_code: 200
  register: _indexer_defs

- name: Fetch currently configured proxies in Prowlarr
  uri:
    url: "http://localhost:9696/api/v1/indexerproxy"
    method: GET
    headers: { X-Api-Key: "{{ prowlarr_api_key }}" }
    status_code: 200
  register: _current_proxies

- name: Ensure Flaresolverr proxy is configured
  uri:
    url: "http://localhost:9696/api/v1/indexerproxy"
    method: POST
    headers: { X-Api-Key: "{{ prowlarr_api_key }}" }
    body_format: json
    body:
      name: "FlareSolverr"
      implementation: "FlareSolverr"
      configContract: "FlareSolverrSettings"
      fields:
        - { name: "baseUrl", value: "http://flaresolverr:8191" }
    status_code: [200, 201]
  when: 
    - _current_proxies.json is defined
    - "_current_proxies.json | selectattr('name', 'equalto', 'FlareSolverr') | list | length == 0"

- name: Fetch currently configured indexers in Prowlarr
  uri:
    url: "http://localhost:9696/api/v1/indexer"
    method: GET
    headers: { X-Api-Key: "{{ prowlarr_api_key }}" }
    status_code: 200
  register: _current_indexers

- name: Ensure Prowlarr indexers are configured and enabled
  uri:
    url: "http://localhost:9696/api/v1/indexer{{ '/' + (existing_indexer.id | string) if existing_indexer else '' }}?forceSave=true"
    method: "{{ 'PUT' if existing_indexer else 'POST' }}"
    headers: { X-Api-Key: "{{ prowlarr_api_key }}" }
    body_format: json
    body:
      id: "{{ existing_indexer.id | default(omit) }}"
      name: "{{ indexer_def.name }}"
      implementation: "{{ indexer_def.implementation }}"
      configContract: "{{ indexer_def.configContract }}"
      appProfileId: 1
      protocol: "torrent"
      priority: 25
      privacy: "{{ indexer_def.privacy }}"
      fields: "{{ indexer_def.fields }}"
      enable: true
      syncLevel: "fullSync"
      tags: []
    status_code: [200, 201, 202, 400] # 400 allowed because forceSave might still report site-down errors
  loop: "{{ prowlarr_indexers }}"
  loop_control:
    loop_var: target_indexer
  vars:
    indexer_def: "{{ (_indexer_defs.json | selectattr('name', 'equalto', target_indexer) | first) if (_indexer_defs.json is defined and _indexer_defs.json | selectattr('name', 'equalto', target_indexer) | list | length > 0) else none }}"
    existing_indexer: "{{ (_current_indexers.json | selectattr('name', 'equalto', target_indexer) | first) if (_current_indexers.json is defined and _current_indexers.json | selectattr('name', 'equalto', target_indexer) | list | length > 0) else none }}"
  when: 
    - indexer_def is not none
    - _indexer_defs.json is defined
    - _current_indexers.json is defined
  ignore_errors: yes # Final safety: Don't let a single indexer site-down event crash the homelab deployment

