---
- name: Ensure nested qBittorrent config directory exists
  file:
    path: "{{ config_root }}/qbittorrent/qBittorrent"
    state: directory
    owner: "{{ puid }}"
    group: "{{ pgid }}"
    mode: '0755'

# Deterministic salt so the hash — and therefore qBittorrent.conf — is stable
# across runs. Homelab threat model treats the secrets file as ground truth; a
# derived salt is fine. Bump the domain string to force re-derivation.
- name: Derive stable qBittorrent PBKDF2 hash
  no_log: true
  shell: |
    python3 -c "
    import base64, hashlib
    password = '{{ admin_password }}'
    salt = hashlib.sha256(b'qbittorrent-homelab-v1:' + password.encode()).digest()[:16]
    key = hashlib.pbkdf2_hmac('sha512', password.encode(), salt, 100000)
    print('{}:{}'.format(base64.b64encode(salt).decode(), base64.b64encode(key).decode()))
    "
  register: _qbittorrent_hash_raw
  changed_when: false

- name: Set qBittorrent hash fact
  set_fact:
    qbittorrent_hash: "@ByteArray({{ _qbittorrent_hash_raw.stdout }})"

- name: Plan qBittorrent config update (check-mode probe)
  template:
    src: qBittorrent.conf.j2
    dest: "{{ config_root }}/qbittorrent/qBittorrent/qBittorrent.conf"
    owner: "{{ puid }}"
    group: "{{ pgid }}"
    mode: '0644'
  check_mode: true
  diff: false
  register: _qbittorrent_planned
  changed_when: false

# Only disrupt qBittorrent when the config actually differs. The stop happens
# in-band (not via handler) because qBittorrent must be down *before* the
# template is written or it clobbers the edit from its in-memory state.
- name: Apply qBittorrent config change
  when: _qbittorrent_planned.changed
  block:
    - name: Stop qBittorrent before config write
      shell: "docker stop qbittorrent || true"
      changed_when: false

    - name: Remove qBittorrent stale recovery and lock files
      file:
        path: "{{ config_root }}/qbittorrent/qBittorrent/{{ stale_file }}"
        state: absent
      loop:
        - qBittorrent_new.conf
        - qBittorrent.conf.bak
        - lockfile
      loop_control:
        loop_var: stale_file

    - name: Write qBittorrent config file
      template:
        src: qBittorrent.conf.j2
        dest: "{{ config_root }}/qbittorrent/qBittorrent/qBittorrent.conf"
        owner: "{{ puid }}"
        group: "{{ pgid }}"
        mode: '0644'
      notify: restart qbittorrent
