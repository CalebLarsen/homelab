---
- name: Ensure shared Docker network exists
  docker_network:
    name: "{{ docker_network }}"

- name: Install sqlite3 for database injection
  apt:
    name: sqlite3
    state: present

- name: Set API key facts
  set_fact:
    sonarr_api_key: "{{ api_keys.sonarr }}"
    radarr_api_key: "{{ api_keys.radarr }}"
    prowlarr_api_key: "{{ api_keys.prowlarr }}"

- name: Create service directories in repo (on target)
  file:
    path: "services/{{ item.name }}"
    state: directory
  loop: "{{ services }}"
  loop_control:
    label: "{{ item.name }}"

- name: Ensure appdata config directories exist on host
  file:
    path: "{{ config_root }}/{{ item.name }}"
    state: directory
    owner: "{{ puid }}"
    group: "{{ pgid }}"
    mode: '0755'
  loop: "{{ services }}"
  loop_control:
    label: "{{ item.name }}"

- name: Run per-service pre-deploy configuration
  include_tasks: "per_service/{{ item.name }}.yml"
  loop: "{{ services }}"
  loop_control:
    label: "{{ item.name }}"

- name: Ensure admin user exists in Servarr databases
  no_log: true
  shell: |
    python3 -c "
    import sqlite3, hashlib, os, base64, uuid
    password = '{{ admin_password }}'
    # All modern Servarr apps (Sonarr v4, Radarr v5, Prowlarr) use HMAC-SHA512 @ 10k iterations
    apps = ['sonarr', 'radarr', 'prowlarr']
    iterations = 10000
    for app in apps:
        db_path = '{{ config_root }}/{}/{}.db'.format(app, app)
        if not os.path.exists(db_path): continue
        salt = os.urandom(16)
        key = hashlib.pbkdf2_hmac('sha512', password.encode(), salt, iterations, dklen=32)
        conn = sqlite3.connect(db_path)
        cur = conn.cursor()
        identifier = str(uuid.uuid4())
        try:
            cur.execute(\"SELECT Identifier FROM Users WHERE Username='admin'\")
            row = cur.fetchone()
            if row:
                identifier = row[0]
            cur.execute(\"INSERT OR REPLACE INTO Users (Id, Identifier, Username, Password, Salt, Iterations) VALUES (1, ?, 'admin', ?, ?, ?)\",
                        (identifier, base64.b64encode(key).decode(), base64.b64encode(salt).decode(), iterations))
        except sqlite3.OperationalError:
            pass
        conn.commit()
        conn.close()
    "
  notify: restart servarrs

- name: Deploy Docker Compose templates
  template:
    src: "../../services/{{ item.name }}/docker-compose.yml.j2"
    dest: "services/{{ item.name }}/docker-compose.yml"
  loop: "{{ services }}"
  loop_control:
    label: "{{ item.name }}"

# Compose refuses to create a container when the name is globally taken,
# even by a container from a different project. This reclaims names held
# by stray containers (manual `docker run`, aborted deploys, pre-migration
# leftovers). A healthy compose-managed container has the matching
# com.docker.compose.project label and is left alone.
- name: Find containers occupying service names
  community.docker.docker_container_info:
    name: "{{ item.name }}"
  loop: "{{ services }}"
  loop_control:
    label: "{{ item.name }}"
  register: _container_info

- name: Reclaim names held by unmanaged containers
  community.docker.docker_container:
    name: "{{ _c.item.name }}"
    state: absent
  loop: "{{ _container_info.results }}"
  loop_control:
    loop_var: _c
    label: "{{ _c.item.name }}"
  when:
    - _c.exists | default(false)
    - (((_c.container | default({})).Config | default({})).Labels | default({})).get('com.docker.compose.project', '') != _c.item.name

- name: Deploy Gluetun service (Idempotent)
  community.docker.docker_compose_v2:
    project_src: "services/gluetun"
    state: present
    pull: missing
    remove_orphans: true
  register: _gluetun_deploy
  when: "'gluetun' in services | map(attribute='name') | list"

- name: Wait for Gluetun to be healthy
  community.docker.docker_container_info:
    name: gluetun
  register: _gluetun_info
  until: _gluetun_info.container.State.Health.Status == 'healthy'
  retries: 30
  delay: 5
  when: "'gluetun' in services | map(attribute='name') | list"

- name: Deploy VPN-dependent services (Idempotent)
  community.docker.docker_compose_v2:
    project_src: "services/{{ item.name }}"
    state: present
    pull: missing
    remove_orphans: true
    recreate: "{{ 'always' if _gluetun_deploy.changed | default(false) else 'auto' }}"
  loop: "{{ services | selectattr('use_vpn', 'defined') | selectattr('use_vpn', 'equalto', true) | list }}"
  loop_control:
    label: "{{ item.name }}"

- name: Deploy remaining Docker services (Idempotent)
  community.docker.docker_compose_v2:
    project_src: "services/{{ item.name }}"
    state: present
    pull: missing
    remove_orphans: true
  loop: "{{ services | rejectattr('name', 'equalto', 'gluetun') | selectattr('use_vpn', 'undefined') | list +
           services | rejectattr('name', 'equalto', 'gluetun') | selectattr('use_vpn', 'defined') | rejectattr('use_vpn', 'equalto', true) | list }}"
  loop_control:
    label: "{{ item.name }}"

- name: Run API wiring tasks
  include_tasks: api_wiring.yml

- name: Run Audiobookshelf post-deploy provisioning
  include_tasks: audiobookshelf_post.yml
  when: "'audiobookshelf' in services | map(attribute='name') | list"
