---
# Per-service restart handlers. `listen:` groups multiple restarts under a single
# notification — useful when one task touches several services (e.g. the Servarr
# admin injection writes sonarr/radarr/prowlarr DBs in a single shell call).

- name: restart sonarr
  community.docker.docker_compose_v2:
    project_src: services/sonarr
    state: restarted
  listen: restart servarrs

- name: restart radarr
  community.docker.docker_compose_v2:
    project_src: services/radarr
    state: restarted
  listen: restart servarrs

- name: restart prowlarr
  community.docker.docker_compose_v2:
    project_src: services/prowlarr
    state: restarted
  listen: restart servarrs

- name: restart cleanuparr
  community.docker.docker_compose_v2:
    project_src: services/cleanuparr
    state: restarted

- name: restart audiobookshelf
  community.docker.docker_compose_v2:
    project_src: services/audiobookshelf
    state: restarted

- name: restart qbittorrent
  community.docker.docker_compose_v2:
    project_src: services/qbittorrent
    state: restarted

- name: restart caddy
  community.docker.docker_compose_v2:
    project_src: services/caddy
    state: restarted

- name: restart cross-seed
  community.docker.docker_compose_v2:
    project_src: services/cross-seed
    state: restarted
