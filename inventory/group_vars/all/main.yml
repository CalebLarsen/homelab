---
timezone: "America/Chicago"
puid: 1000
pgid: 1000
docker_network: "homelab_network"
data_root: "/home/caleb/data"
config_root: "/home/caleb/config"
# mergerfs version pinned from upstream (trapexit/mergerfs) — apt's package is
# too old to support the link_exdev option that cross-seed / *arr hardlinks
# rely on. Bump this to take newer releases; the mergerfs role re-installs.
mergerfs_version: "2.41.1"

vpn_public:
  provider: "mullvad"
  server_cities: "Stockholm"

cloudflare:
  tunnel_name: "homelab"
  domain: "caleb.trade"

# Master Service List
# This is the single source of truth for all apps in your homelab. Each entry
# defines a service's identity, network exposure, and container image. Pin
# `image:` to a specific tag (e.g. `lscr.io/linuxserver/plex:1.41.6...`) when
# you want to lock against upstream drift; `:latest` is fine for most things.
# Service-specific extended config (qbittorrent settings, cleanuparr SQL,
# overseerr libraries, etc.) lives in dedicated blocks further down.
services:
  - name: caddy  # reverse proxy + static site host
    image: "caddy:latest"
  - name: gluetun
    port: 8888  # internal control port; not exposed
    image: "qmcgaw/gluetun:latest"
  - name: sonarr
    port: 8989
    image: "lscr.io/linuxserver/sonarr:latest"
  - name: radarr
    port: 7878
    image: "lscr.io/linuxserver/radarr:latest"
  - name: prowlarr
    port: 9696
    use_vpn: true
    image: "lscr.io/linuxserver/prowlarr:latest"
  - name: qbittorrent
    port: 6969
    torrent_port: 8694
    use_vpn: true
    image: "lscr.io/linuxserver/qbittorrent:latest"
  - name: flaresolverr
    port: 8191
    image: "ghcr.io/flaresolverr/flaresolverr:latest"
  - name: bazarr
    port: 6767
    image: "lscr.io/linuxserver/bazarr:latest"
  - name: audiobookshelf
    port: 13378
    internal_port: 80
    image: "ghcr.io/advplyr/audiobookshelf:latest"
  - name: overseerr
    subdomain: "request"
    port: 5055
    public: true
    image: "lscr.io/linuxserver/overseerr:latest"
  - name: plex
    subdomain: "plex"
    port: 32400
    public: true
    image: "lscr.io/linuxserver/plex:latest"
  - name: tautulli
    port: 8181
    image: "lscr.io/linuxserver/tautulli:latest"
  - name: kometa
    port: 0  # no web UI; run-once / scheduled
    image: "kometateam/kometa:latest"
  - name: recyclarr
    port: 0  # one-shot container
    image: "ghcr.io/recyclarr/recyclarr:latest"
  - name: cleanuparr
    port: 11011
    # Pinned: schema-coupled SQL injection in api_wiring.yml needs to break
    # loudly on upgrade. Run `docker inspect cleanuparr | grep Image` to find
    # the currently-running version before bumping this tag.
    image: "ghcr.io/cleanuparr/cleanuparr:2.9.8"
  - name: cross-seed  # finds .torrent files for existing data via Prowlarr
    port: 2468
    image: "ghcr.io/cross-seed/cross-seed:latest"

overseerr:
  # client_id, plex_machine_id, and users[] live in overseerr_secret.* in the
  # SOPS-encrypted secrets file (PII / per-instance identifiers).
  plex_name: "oddfellow"
  libraries:
    - { name: "Movies", type: "movie", path: "/data/media/movies" }
    - { name: "TV Shows", type: "show", path: "/data/media/tv" }

