---
timezone: "America/Chicago"
puid: 1000
pgid: 1000
docker_network: "homelab_network"
data_root: "/home/caleb/data"
config_root: "/home/caleb/config"
# mergerfs version pinned from upstream (trapexit/mergerfs) — apt's package is
# too old to support the link_exdev option that cross-seed / *arr hardlinks
# rely on. Bump this to take newer releases; the mergerfs role re-installs.
mergerfs_version: "2.41.1"

vpn_public:
  provider: "mullvad"
  server_cities: "Stockholm"

# Host-level scripts and cron jobs managed by the host_cron role. Scripts
# live at roles/host_cron/files/<name> in the repo and get deployed to
# ~/bin/<name> on the target. Cron entries are installed via Ansible's
# `cron` module which matches on `name:` — rename with care.
host_scripts:
  - move_old_media.sh

host_cron_jobs:
  - name: "Tiered media mover"
    minute: "0"
    hour: "4"
    job: "/home/caleb/bin/move_old_media.sh"
  - name: "Nightly qbittorrent restart"
    minute: "0"
    hour: "0"
    job: "/usr/bin/docker restart qbittorrent"

cloudflare:
  tunnel_name: "homelab"
  domain: "caleb.trade"

# Local restic backup. Target is the 7.3TB external (seagate). The
# passphrase lives in secrets.sops.yml as `restic_password` — without it
# the repo cannot be opened. See docs/backups.md for restore steps and
# docs/decisions/0009-local-restic-backup.md for the rationale.
backup:
  target: "/media/seagate/restic-backup"

# Master Service List
# This is the single source of truth for all apps in your homelab. Each entry
# defines a service's identity, network exposure, and container image.
#
# Image pinning policy (see docs/decisions/0006-pinned-image-digests.md):
#   image: "<repo>:<tag>@sha256:<digest>"   — tag for humans, digest for the
#                                             pull. Digest is what actually
#                                             resolves; tag is documentation.
#   image: "<repo>@sha256:<digest>"         — when upstream does not expose a
#                                             meaningful version label.
# Never use a floating tag (`:latest`, `:stable`). Bumping = update both the
# tag and the digest in the same commit. Get the digest with:
#   docker image inspect <repo>:<tag> --format '{{index .RepoDigests 0}}'
# NOT `docker inspect <container> --format '{{.Image}}'` — that's the image
# config ID, which compose can't pull by (see decisions/0006).
#
# NOTE: not every public subdomain lives in this list. Static-only sites that
# do not have a backend container are handled by their own roles and a hard-
# coded vhost in Caddyfile.j2 — see roles/notes for note.caleb.trade.
services:
  - name: caddy # reverse proxy + static site host
    image: "caddy:2.9.1@sha256:a863d46cf06a9084f36cbffbe9f4ad046971dca32f79c68129aaf15ad356d6ce"
  - name: gluetun
    port: 8888 # internal control port; not exposed
    # qmcgaw/gluetun does not set a meaningful version label (only `latest`).
    # To bump: `docker exec gluetun /gluetun-entrypoint version` or check
    # github.com/qdm12/gluetun releases for the digest you want.
    image: "qmcgaw/gluetun@sha256:183c74263a07f4c931979140ac99ff4fbc44dcb1ca5b055856ef580b0fafdf1c"
  - name: sonarr
    port: 8989
    image: "lscr.io/linuxserver/sonarr:4.0.14.2939-ls282@sha256:bae1b72ad55cee030a416aaaef1f20eee076e4c1c6d490689904d4609a2cabac"
  - name: radarr
    port: 7878
    image: "lscr.io/linuxserver/radarr:5.22.4.9896-ls274@sha256:105b7ffb9e88880a55a3fcd6116542f19af21aae8884a4e276e007d2816bbacb"
  - name: prowlarr
    port: 9696
    use_vpn: true
    image: "lscr.io/linuxserver/prowlarr:1.35.1.5034-ls117@sha256:dec1e580aad36bccaeb1aba283f01a5263761905c304875a603c9a952ecfda79"
  - name: qbittorrent
    port: 6969
    torrent_port: 8694
    use_vpn: true
    image: "lscr.io/linuxserver/qbittorrent:5.1.0-r0-ls393@sha256:eb16ef40b8ba2b6287184a8961d00c50abb99b3782365df70b63671d5c3504d8"
  - name: flaresolverr
    port: 8191
    image: "ghcr.io/flaresolverr/flaresolverr:v3.3.21@sha256:f104ee51e5124d83cf3be9b37480649355d223f7d8f9e453d0d5ef06c6e3b31b"
  - name: bazarr
    port: 6767
    image: "lscr.io/linuxserver/bazarr:v1.5.2-ls304@sha256:558d6ddf36cd87bac5d4fb2ee8488730c4f65718961ef4ca7073062378aa7641"
  - name: audiobookshelf
    port: 13378
    internal_port: 80
    image: "ghcr.io/advplyr/audiobookshelf:2.30.0@sha256:6fbd7dc95d53c6e168ce69e760b87c334e3b9ba88bf7b8531ed5a116d5d6da03"
  - name: overseerr
    subdomain: "request"
    port: 5055
    public: true
    # Migrated 2026-04-26 from lscr.io/linuxserver/overseerr (sct/overseerr,
    # archived 2026-02-15) to ghcr.io/seerr-team/seerr per decisions/0007.
    # Service is still named `overseerr` (DNS, appdata path, compose project)
    # to keep the migration small; can rename to `seerr` later.
    image: "ghcr.io/seerr-team/seerr:v3.2.0@sha256:c4cbd5121236ac2f70a843a0b920b68a27976be57917555f1c45b08a1e6b2aad"
  - name: plex
    subdomain: "plex"
    port: 32400
    public: true
    image: "lscr.io/linuxserver/plex:1.41.6.9685-d301f511a-ls264@sha256:53e6a94b2649b3c817757bbdf28d7970bc10e036ec0868b0704f3f51aa612742"
  - name: tautulli
    port: 8181
    image: "lscr.io/linuxserver/tautulli:v2.15.2-ls189@sha256:a9b699b5cdbc3a79c1d05a250daf1f9f9cba76dc8628d6caeffdbc99b42d8625"
  - name: kometa
    port: 0 # no web UI; run-once / scheduled
    # kometateam/kometa does not set a version label. To identify a digest's
    # release, see kometa.wiki release notes or github.com/Kometa-Team/Kometa.
    image: "kometateam/kometa@sha256:b265e952fcc3931ac378601faf9e6e0d90bee104fc70d9002f59c8678bf00b87"
  - name: recyclarr
    port: 0 # one-shot container
    image: "ghcr.io/recyclarr/recyclarr:8.3.2@sha256:55afe316d3e4e4e3b9120cef7c79436b1b5311f6a18d4ef4b7653e720499c90a"
  - name: cleanuparr
    port: 11011
    # Schema-coupled SQL injection in api_wiring.yml needs to break loudly on
    # upgrade — see docs/decisions/0005-cleanuparr-pinned-tag.md. Read live
    # `.schema` of cleanuparr.db and users.db before bumping this digest.
    image: "ghcr.io/cleanuparr/cleanuparr:2.9.8@sha256:563b01707cb4509731793ce03bfc26f08640f4194908cc1fa6782e75f59dc405"
  - name: cross-seed # finds .torrent files for existing data via Prowlarr
    port: 2468
    # OCI label reports `version-6.13.6`; the upstream tag scheme uses this
    # exact prefix, so the tag below should resolve. If it does not, fall
    # back to digest-only (drop `:version-6.13.6` from the line).
    image: "ghcr.io/cross-seed/cross-seed:version-6.13.6@sha256:e2bf5b593e4e7d699e6242423ad7966190cd52ba8eefafdfdbb0cb5b0b609b96"
  - name: anki
    subdomain: "anki"
    port: 27701
    internal_port: 8080
    public: true
    # The jeankhawand image's internal port and on-disk layout have shifted
    # between major tags (the "distroless" variants use /root/.syncserver
    # instead of /anki_data). Bump deliberately.
    image: "jeankhawand/anki-sync-server:25.07@sha256:bac64aef13fbfe3e2e3ce8c25da732763bcdffe856225e366d4cda54eb829ef9"

overseerr:
  # client_id, plex_machine_id, and users[] live in overseerr_secret.* in the
  # SOPS-encrypted secrets file (PII / per-instance identifiers).
  plex_name: "oddfellow"
  libraries:
    - { name: "Movies", type: "movie", path: "/data/media/movies" }
    - { name: "TV Shows", type: "show", path: "/data/media/tv" }

qbittorrent:
  save_path: "/data/torrents"
  incomplete_path: "/data/torrents/incomplete"
  excluded_file_names:
    - "*.ade"
    - "*.adp"
    - "*.apk"
    - "*.app"
    - "*.bas"
    - "*.bat"
    - "*.bin"
    - "*.chm"
    - "*.cmd"
    - "*.com"
    - "*.cpl"
    - "*.crt"
    - "*.dll"
    - "*.drv"
    - "*.exe"
    - "*.hlp"
    - "*.hta"
    - "*.html"
    - "*.inf"
    - "*.ins"
    - "*.ipa"
    - "*.iso"
    - "*.isp"
    - "*.jar"
    - "*.js"
    - "*.jse"
    - "*.key"
    - "*.lnk"
    - "*.mda"
    - "*.mdb"
    - "*.mdt"
    - "*.mdw"
    - "*.mdz"
    - "*.mht"
    - "*.mhtml"
    - "*.msi"
    - "*.msp"
    - "*.nsh"
    - "*.ocx"
    - "*.php"
    - "*.pif"
    - "*.potm"
    - "*.potx"
    - "*.ppam"
    - "*.ppsx"
    - "*.pptm"
    - "*.ps1"
    - "*.ps2"
    - "*.psd1"
    - "*.psm1"
    - "*.py"
    - "*.reg"
    - "*.scf"
    - "*.scr"
    - "*.sh"
    - "*.sldm"
    - "*.sldx"
    - "*.sys"
    - "*.tmp"
    - "*.torrent"
    - "*.vb"
    - "*.vbe"
    - "*.vbs"
    - "*.vxd"
    - "*.wsf"
    - "*.wsh"
    - "*.xlam"
    - "*.xlsb"
    - "*.xlsm"
    - "*.xltm"
    - "*.zipx"
    - "*sample.avi"
    - "*sample.mkv"
    - "*sample.mp4"
  # Tracker list pulled at deploy time from ngosang/trackerslist (pinned by
  # commit, fetched once per run from the Ansible controller). Bump by
  # picking a newer commit from
  # https://github.com/ngosang/trackerslist/commits/master and updating
  # `repo_commit` below. Switch `file` to `trackers_all.txt` for the full
  # ~85-entry list instead of the curated `_best` subset.
  trackers_source:
    repo_commit: "50a204edfeb4f5f904a28e20b650966241203edb" # 2026-04-26
    file: "trackers_best.txt"
  # See roles/service_manager/tasks/per_service/qbittorrent.yml for the
  # fetch + parse step that produces the service_manager_qbittorrent_trackers fact consumed
  # by qBittorrent.conf.j2.

prowlarr_indexers:
  - 1337x
  - "Bangumi Moe"
  - EZTV
  - LimeTorrents
  - MagnetDownload
  - nekoBT
  - Nyaa.si
  - "The Pirate Bay"
  - showRSS
  - "Tokyo Toshokan"
  - Uindex
  - YTS
  - TorrentGalaxyClone

cleanuparr:
  auth_user: admin
  auth_password: "{{ admin_password }}"
  stalled_threshold_seconds: 7200
  min_progress_percent: 10

storage:
  site_root: "/home/caleb/www"
  disks:
    - name: shield
      uuid: d4e84780-c89a-4b2f-9de1-27b140ba61d9
    - name: seagate
      uuid: c4a1a3dd-22d8-4cde-95f4-f7cf82a6735e
  pool_path: "/home/caleb/data"
  nvme_path: "/home/caleb/nvme"
  # Subdirectories pre-created on EVERY mergerfs branch so hardlinks resolve.
  # Without this, mergerfs's create policy may put a new directory on a
  # different underlying disk than the source file → EXDEV when linking.
  # See roles/mergerfs/tasks/main.yml for the nested-loop creation step.
  pool_subdirs:
    - torrents
    - media/movies
    - media/tv
    - media/audiobooks
    - cross-seed-links
